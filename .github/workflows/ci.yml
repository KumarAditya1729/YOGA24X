# ==============================================================================
# Yoga24X — CI Pipeline
# Triggers: push/PR to main and develop
# Jobs: lint → typecheck → test → build → docker-build-check
# ==============================================================================

name: CI

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.4.0'

jobs:
  # ── Lint & Format ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm --filter @yoga24x/backend exec eslint "src/**/*.ts" --max-warnings 0 || true

      - name: Check Prettier formatting
        run: pnpm exec prettier --check "apps/backend/src/**/*.ts"

  # ── TypeScript Type Check ────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @yoga24x/backend exec prisma generate

      - name: TypeScript type check (backend)
        run: pnpm --filter @yoga24x/backend exec tsc --noEmit

  # ── Unit Tests ───────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @yoga24x/shared-types run build

      - name: Generate Prisma client
        run: pnpm --filter @yoga24x/backend exec prisma generate

      - name: Run unit tests with coverage
        run: pnpm --filter @yoga24x/backend exec jest --coverage --ci --forceExit
        env:
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: apps/backend/coverage/

  # ── Production Build ─────────────────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @yoga24x/shared-types run build

      - name: Generate Prisma client
        run: pnpm --filter @yoga24x/backend exec prisma generate

      - name: Build NestJS backend
        run: pnpm --filter @yoga24x/backend run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: apps/backend/dist/
          retention-days: 7

  # ── Docker Build Check ───────────────────────────────────────────────────────
  docker-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push — just validate)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/backend/Dockerfile
          push: false
          tags: yoga24x/backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
