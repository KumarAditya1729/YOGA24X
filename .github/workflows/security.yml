# ==============================================================================
# Yoga24X — Security Scanning Pipeline
# Triggers: push to main, weekly schedule
# Jobs: dependency-audit, sast, secret-scanning
# ==============================================================================

name: Security

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 2 AM UTC
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.4.0'

jobs:
  # ── Dependency Vulnerability Audit ──────────────────────────────────────────
  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit for high/critical vulnerabilities
        run: pnpm audit --audit-level high
        continue-on-error: true  # Report but don't fail CI on existing vulns

      - name: Generate audit report
        run: pnpm audit --json > security-audit.json 2>/dev/null || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: security-audit.json

