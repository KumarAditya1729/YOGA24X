version: '3.8'

# ==============================================================================
# Yoga24X — Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
# ==============================================================================

services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    container_name: yoga24x_backend_prod
    restart: always
    env_file:
      - ../../apps/backend/.env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://yoga24x_prod:${DB_PASSWORD}@postgres:5432/yoga24x_prod?schema=public&sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - yoga24x_network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: yoga24x_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: yoga24x_prod
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: yoga24x_prod
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yoga24x_prod -d yoga24x_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    networks:
      - yoga24x_network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: yoga24x_redis_prod
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 768M
    networks:
      - yoga24x_network

  # ── Ollama (Sovereign AI) ─────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: yoga24x_ollama_prod
    restart: always
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - yoga24x_network
    deploy:
      resources:
        limits:
          memory: 8G

networks:
  yoga24x_network:
    driver: bridge

volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local
  ollama_models:
    driver: local
