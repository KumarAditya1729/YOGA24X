# ==============================================================================
# Yoga24X — Kubernetes Backend Deployment
# ==============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: yoga24x-backend
  namespace: yoga24x
  labels:
    app: yoga24x-backend
    version: "1.0.0"
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: yoga24x-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0 # Zero-downtime deployments
  template:
    metadata:
      labels:
        app: yoga24x-backend
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3001"
    spec:
      serviceAccountName: yoga24x-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: backend
          image: ghcr.io/yoga24x/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: yoga24x-backend-config
            - secretRef:
                name: yoga24x-backend-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - yoga24x-backend
                topologyKey: kubernetes.io/hostname
---
# ── Service ────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: yoga24x-backend
  namespace: yoga24x
  labels:
    app: yoga24x-backend
spec:
  selector:
    app: yoga24x-backend
  ports:
    - name: http
      port: 80
      targetPort: 3001
      protocol: TCP
  type: ClusterIP
---
# ── Horizontal Pod Autoscaler ──────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: yoga24x-backend-hpa
  namespace: yoga24x
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: yoga24x-backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300 # Wait 5 min before scale-down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
---
# ── ServiceAccount ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: yoga24x-backend
  namespace: yoga24x
  labels:
    app: yoga24x-backend
