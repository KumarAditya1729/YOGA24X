# ==============================================================================
# Yoga24X — Kubernetes Ingress (NGINX)
# TLS termination, rate limiting, and path routing
# ==============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yoga24x-ingress
  namespace: yoga24x
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # Rate limiting: 100 r/min per IP on auth endpoints
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-connections: "50"
    # Security headers (supplementing Helmet)
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-XSS-Protection: 1; mode=block";
    # TLS certificate (cert-manager)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - api.yoga24x.com
      secretName: yoga24x-api-tls
  rules:
    - host: api.yoga24x.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: yoga24x-backend
                port:
                  number: 80
